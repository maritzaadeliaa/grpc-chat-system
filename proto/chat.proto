syntax = "proto3";

package chat;

service ChatService {
  rpc ChatStream(stream ChatMessage) returns (stream ChatMessage);
}

message ChatMessage {
  string username  = 1;
  string room      = 2;
  string message   = 3;
  string timestamp = 4;
  string msg_type  = 5; // "message" | "typing" | "join" | "leave"
}